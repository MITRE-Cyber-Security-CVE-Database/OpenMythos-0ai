name: OpenMythos CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools<82" wheel build
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Compile MCP
        run: python -m py_compile mcp/openmythos_0ai_mcp.py

      - name: Run tests
        run: pytest -q

      - name: Build package
        run: python -m build
